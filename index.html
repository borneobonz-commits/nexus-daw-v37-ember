<!DOCTYPE html>
<html lang="en" data-theme="ember">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEXUS DAW v39 MAESTRO ULTIMATE - Full Professional DAW</title>
<link rel="manifest" href="manifest.json">
<style>
:root[data-theme="ember"] {
  --bg-deep:#030407;--bg-console:#0A0B0E;--bg-rack:#111215;--bg-window:#16171B;
  --neon-primary:#FF5A00;--neon-secondary:#FFB000;--neon-accent:#FFE600;
  --text-main:#E8E8E8;--text-dim:#7A7A7A;--border-hardware:#2A2A2E;--rec-red:#FF3B30;--play-green:#30D158;
}
:root[data-theme="obsidian"] {
  --bg-deep:#0a0a0a;--bg-console:#141414;--bg-rack:#1a1a1a;--bg-window:#202020;
  --neon-primary:#00d9ff;--neon-secondary:#0099ff;--neon-accent:#00ff88;
  --text-main:#e0e0e0;--text-dim:#666666;--border-hardware:#333333;--rec-red:#ff1744;--play-green:#00e676;
}
:root[data-theme="cyberpunk"] {
  --bg-deep:#0a0514;--bg-console:#1a0f2e;--bg-rack:#2d1a4f;--bg-window:#3d2563;
  --neon-primary:#ff00ff;--neon-secondary:#00ffff;--neon-accent:#ffff00;
  --text-main:#f0f0f0;--text-dim:#aa00ff;--border-hardware:#6600ff;--rec-red:#ff0080;--play-green:#00ff80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:11px;overflow:hidden;height:100vh}
.nexus-dock{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:var(--bg-console);border:1px solid var(--border-hardware);padding:8px;display:flex;gap:6px;z-index:9999;border-radius:8px;backdrop-filter:blur(10px)}
.dock-btn{width:40px;height:40px;background:var(--bg-rack);border:1px solid var(--border-hardware);color:var(--neon-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:4px;transition:all 0.2s}
.dock-btn:hover{border-color:var(--neon-primary);color:var(--neon-primary);transform:scale(1.1)}
.window{position:absolute;background:var(--bg-window);border:1px solid var(--border-hardware);min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.8);overflow:hidden;border-radius:6px}
.window-header{background:var(--bg-rack);padding:6px 8px;border-bottom:1px solid var(--border-hardware);cursor:move;display:flex;justify-content:space-between;align-items:center;user-select:none}
.window-title{color:var(--neon-secondary);font-weight:700;font-size:10px;letter-spacing:1px}
.window-controls{display:flex;gap:4px}
.win-btn{width:16px;height:16px;background:var(--bg-console);border:1px solid var(--border-hardware);color:var(--text-dim);cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:all 0.2s}
.win-btn:hover{background:var(--neon-primary);color:#000}
.window-body{padding:12px;overflow:auto;max-height:calc(100vh - 80px)}
input[type="text"],input[type="number"],.select-control{width:100%;background:var(--bg-deep);border:1px solid var(--border-hardware);color:var(--text-main);padding:6px;font-size:10px;margin-bottom:6px;border-radius:3px;font-family:inherit}
.btn{width:100%;background:var(--neon-primary);border:none;color:#000;padding:8px;font-size:10px;font-weight:700;cursor:pointer;margin-bottom:6px;border-radius:3px;transition:all 0.2s;font-family:inherit}
.btn:hover{background:var(--neon-secondary);transform:translateY(-2px)}
.btn.secondary{background:var(--bg-rack);color:var(--neon-secondary);border:1px solid var(--border-hardware)}
.status{font-size:9px;color:var(--text-dim);padding:4px;background:var(--bg-deep);border:1px solid var(--border-hardware);margin-bottom:8px;border-radius:3px}
.ctrl-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.ctrl-group{flex:1}
.ctrl-label{font-size:8px;color:var(--text-dim);margin-bottom:2px;display:block;text-transform:uppercase}
.slider{width:100%;height:4px;background:var(--bg-deep);appearance:none;border:1px solid var(--border-hardware);border-radius:2px}
.slider::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--neon-primary);cursor:pointer;border-radius:50%;box-shadow:0 0 8px rgba(255,90,0,0.5)}
.transport{display:flex;gap:6px;margin-bottom:8px}
.transport-btn{flex:1;background:var(--bg-rack);border:1px solid var(--border-hardware);color:var(--neon-secondary);padding:8px;font-size:10px;font-weight:700;cursor:pointer;border-radius:3px;transition:all 0.2s;font-family:inherit}
.transport-btn.rec{background:var(--rec-red);color:#fff;border-color:var(--rec-red)}
.transport-btn.play{background:var(--play-green);color:#000;border-color:var(--play-green)}
.transport-btn.rec.active,.transport-btn.play.active{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.seq-grid{display:grid;grid-template-columns:repeat(16,1fr);gap:2px;margin:8px 0}
.seq-step{height:20px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer;border-radius:2px}
.seq-step.active{background:var(--neon-primary);box-shadow:0 0 8px var(--neon-primary)}
.seq-step.playing{border:2px solid var(--neon-accent)}
.row-label{width:50px;font-size:8px;color:var(--text-dim);text-align:right;padding:4px 0}
.seq-row{display:flex;gap:6px;margin-bottom:4px;align-items:center}
.kbd{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin:8px 0}
.key{height:35px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer;border-radius:2px;font-size:7px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px}
.key:active,.key.active{background:var(--neon-primary)}
.key.black{background:var(--bg-deep);position:relative;z-index:10}
.drum-pad{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:8px 0}
.pad{height:60px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-dim)}
.pad:active{background:var(--neon-primary);color:#000;border-color:var(--neon-accent)}
.fx-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.fx-label{width:70px;font-size:8px;color:var(--neon-secondary);text-transform:uppercase}
.mix-channel{display:flex;gap:4px;margin-bottom:6px;align-items:center;padding:4px;background:var(--bg-deep);border:1px solid var(--border-hardware);border-radius:3px}
.mix-label{width:35px;font-size:8px;color:var(--text-dim)}
.mix-fader{flex:1;height:4px;background:var(--bg-deep);appearance:none;border:1px solid var(--border-hardware);border-radius:2px}
.mix-fader::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--neon-accent);cursor:pointer;border-radius:50%}
.mix-btn{width:20px;height:20px;background:var(--bg-rack);border:1px solid var(--border-hardware);color:var(--text-dim);font-size:8px;cursor:pointer;border-radius:2px;font-family:inherit}
.mix-btn.active{background:var(--neon-primary);color:#000}
.envelope-viz{height:60px;background:var(--bg-deep);border:1px solid var(--border-hardware);margin:8px 0;border-radius:3px;position:relative;background:linear-gradient(135deg,var(--bg-deep),var(--bg-rack))}
.spectrum-container{display:flex;align-items:flex-end;height:100px;background:var(--bg-deep);border:1px solid var(--border-hardware);gap:1px;padding:4px;margin:8px 0;border-radius:3px}
.spectrum-bar{height:100%;background:linear-gradient(to top,var(--neon-primary),var(--neon-secondary));border-radius:2px;margin:0 1px;flex:1}
.chop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:8px 0}
.chop-pad{height:50px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--neon-secondary);font-family:inherit}
.chop-pad.loaded{background:var(--neon-primary);color:#000}
.pianoroll{height:200px;background:var(--bg-deep);border:1px solid var(--border-hardware);position:relative;overflow:auto;margin:8px 0;border-radius:3px}
.pr-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border-hardware) 1px, transparent 1px),linear-gradient(90deg, var(--border-hardware) 1px, transparent 1px);background-size:40px 20px}
.pr-note{position:absolute;height:18px;background:var(--neon-primary);border:1px solid var(--neon-accent);cursor:move;font-size:7px;color:#000;display:flex;align-items:center;justify-content:center;border-radius:2px}
.project-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow:auto}
.project-item{background:var(--bg-rack);border:1px solid var(--border-hardware);padding:6px;border-radius:3px;display:flex;justify-content:space-between;align-items:center;font-size:9px}
.project-item-btn{background:var(--neon-primary);color:#000;border:none;padding:3px 6px;font-size:8px;cursor:pointer;border-radius:2px;font-family:inherit;font-weight:700}
</style>
</head>
<body>
<div id="workspace"></div>

<div class="nexus-dock" id="dock">
  <button class="dock-btn" onclick="openDecentSampler()" title="Decent Sampler">🎹</button>
  <button class="dock-btn" onclick="openSequencer()" title="16-Step Sequencer">🎛️</button>
  <button class="dock-btn" onclick="openPianoRoll()" title="Piano Roll">🎼</button>
  <button class="dock-btn" onclick="openArpeggiator()" title="Arpeggiator">🎵</button>
  <button class="dock-btn" onclick="openEnvelopeEditor()" title="ADSR Envelope">📈</button>
  <button class="dock-btn" onclick="openScaleLock()" title="Scale Lock">🔐</button>
  <button class="dock-btn" onclick="openFXRack()" title="FX Rack">🎚️</button>
  <button class="dock-btn" onclick="openMixer()" title="Mixer + EQ">📊</button>
  <button class="dock-btn" onclick="openLFOModulator()" title="LFO">🔄</button>
  <button class="dock-btn" onclick="openMasterControl()" title="Master">🎬</button>
  <button class="dock-btn" onclick="openChopper()" title="Sample Chopper">✂️</button>
  <button class="dock-btn" onclick="openProjectManager()" title="Project">💾</button>
  <button class="dock-btn" onclick="toggleTheme()" title="Theme">🎨</button>
</div>

<script src="https://unpkg.com/webaudio-tinysynth@1.6.3/webaudio-tinysynth.min.js"></script>
<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

const workspace = document.getElementById('workspace');
let windowZ = 100;
let synth = null;
let drumMode = false;
let currentVelocity = 100;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let midiAccess = null;

let reverb, delay, chorus, masterCompressor, masterGain;
let mixerChannels = Array(8).fill().map((_, i) => {
  const ch = new Tone.Channel().toDestination();
  return ch;
});

let lfo = null;
let seqPlaying = false, seqStep = 0, seqBPM = 120, seqInterval = null;
let seqPattern = {kick: new Array(16).fill(0), snare: new Array(16).fill(0), hihat: new Array(16).fill(0), note: new Array(16).fill(0)};
let prNotes = [];
let chopSamples = Array(16).fill(null);
let selectedScale = 'C Major';
let envelope = {attack: 0.005, decay: 0.1, sustain: 0.3, release: 0.1};
let arpState = {mode: 'UP', speed: 1, octaves: 1, isPlaying: false};
let projectList = JSON.parse(localStorage.getItem('nexus_projects') || '{}');

const GM_INSTRUMENTS = ['0: Acoustic Grand Piano','4: Electric Piano 1','24: Acoustic Guitar nylon','25: Acoustic Guitar steel','26: Electric Guitar jazz','27: Electric Guitar clean','29: Overdriven Guitar','30: Distortion Guitar','32: Acoustic Bass','33: Electric Bass finger','40: Violin','48: String Ensemble 1','56: Trumpet','73: Flute','80: Lead 1 square','81: Lead 2 sawtooth','88: Pad 1 new age','128: Standard Drum Kit'];
const DRUM_MAP = [{note: 36, name: 'Kick'}, {note: 38, name: 'Snare'}, {note: 42, name: 'HiHat C'}, {note: 46, name: 'HiHat O'}, {note: 41, name: 'Tom L'}, {note: 45, name: 'Tom M'}, {note: 48, name: 'Tom H'}, {note: 49, name: 'Crash'}, {note: 51, name: 'Ride'}, {note: 53, name: 'Ride Bell'}, {note: 37, name: 'Rim'}, {note: 39, name: 'Clap'}, {note: 54, name: 'Tamb'}, {note: 56, name: 'Cowbell'}, {note: 69, name: 'Shaker'}, {note: 75, name: 'Clave'}];
const SF2_PRESETS = [{name: 'GeneralUser GS 30MB', url: 'https://www.schristiancollins.com/generaluser/GeneralUser%20GS%20v1.471.sf2'}, {name: 'Salamander Piano 1GB', url: 'https://musical-artifacts.com/artifacts/3/Piano.sf2'}, {name: 'FluidR3 GM 148MB', url: 'https://keymusician01.s3.amazonaws.com/FluidR3_GM.sf2'}];
const SCALES = {'C Major': [0,2,4,5,7,9,11], 'A Minor': [0,2,3,5,7,8,10], 'Pentatonic': [0,2,4,7,9], 'Blues': [0,3,5,6,7,10], 'Dorian': [0,2,3,5,7,9,10], 'Phrygian': [0,1,3,5,7,8,10], 'Harmonic Minor': [0,2,3,5,7,8,11]};

async function initFX() {
  await Tone.start();
  reverb = new Tone.Reverb({decay: 2, wet: 0}).toDestination();
  delay = new Tone.FeedbackDelay({delayTime: "8n", feedback: 0.3, wet: 0}).connect(reverb);
  chorus = new Tone.Chorus({frequency: 1.5, delayTime: 3.5, depth: 0.7, wet: 0}).connect(delay);
  masterCompressor = new Tone.Compressor({threshold: -30, ratio: 4, attack: 0.003, release: 0.25}).connect(chorus);
  masterGain = new Tone.Gain(0.8).connect(masterCompressor);
  
  mixerChannels.forEach(ch => ch.connect(masterGain));
  
  lfo = new Tone.LFO({frequency: 5, amplitude: 0.5, phase: 0}).start();
}

async function initMIDI() {
  const status = document.getElementById('midi-status');
  if(!navigator.requestMIDIAccess) {if(status) status.textContent = '❌ No MIDI'; return;}
  try {
    midiAccess = await navigator.requestMIDIAccess();
    const inputs = midiAccess.inputs.values();
    let found = false;
    for(let input of inputs) {
      input.onmidimessage = handleMIDIMessage;
      if(status) status.textContent = `✅ MIDI: ${input.name}`;
      found = true;
    }
    if(!found && status) status.textContent = '⚠️ MIDI ready';
    midiAccess.onstatechange = initMIDI;
  } catch(e) {
    if(status) status.textContent = '❌ MIDI Error: ' + e.message;
  }
}

function handleMIDIMessage(msg) {
  if(!synth) return;
  const [cmd, note, vel] = msg.data;
  const type = cmd & 0xf0;
  if(type === 0x90 && vel > 0) {
    synth.noteOn(0, note, vel);
    highlightKey(note, true);
  } else if(type === 0x80 || (type === 0x90 && vel === 0)) {
    synth.noteOff(0, note);
    highlightKey(note, false);
  } else if(type === 0xB0 && note === 1) {
    synth.controllerChange(0, 1, vel);
  } else if(type === 0xE0) {
    const bend = ((vel << 7) | note) - 8192;
    synth.pitchBend(0, bend);
  }
}

function highlightKey(midiNote, on) {
  const key = document.querySelector(`[data-midi="${midiNote}"]`);
  if(key) key.classList.toggle('active', on);
}

async function toggleRecord() {
  const btn = document.getElementById('rec-btn');
  if(!isRecording) {
    if(!synth) {alert('Load SF2 first');return;}
    const stream = synth.getAudioNode().context.createMediaStreamDestination();
    synth.getAudioNode().connect(stream);
    mediaRecorder = new MediaRecorder(stream.stream);
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = exportWAV;
    mediaRecorder.start();
    isRecording = true;
    btn.textContent = '■ STOP';
    btn.classList.add('active');
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.textContent = '● REC';
    btn.classList.remove('active');
  }
}

function exportWAV() {
  const blob = new Blob(recordedChunks, {type: 'audio/webm'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,19).replace(/:/g,'-').replace('T','_');
  a.href = url;
  a.download = `NEXUS_DAW_${ts}.wav`;
  a.click();
  URL.revokeObjectURL(url);
}

function toggleSeqPlay() {
  const btn = document.getElementById('seq-play-btn');
  if(!seqPlaying) {
    if(!synth) {alert('Load SF2 first');return;}
    seqPlaying = true;
    seqStep = 0;
    btn.textContent = '■ STOP';
    btn.classList.add('active');
    const interval = (60 / seqBPM / 4) * 1000;
    seqInterval = setInterval(seqTick, interval);
  } else {
    seqPlaying = false;
    clearInterval(seqInterval);
    btn.textContent = '▶ PLAY';
    btn.classList.remove('active');
    document.querySelectorAll('.seq-step.playing').forEach(s => s.classList.remove('playing'));
  }
}

function seqTick() {
  document.querySelectorAll('.seq-step.playing').forEach(s => s.classList.remove('playing'));
  document.querySelectorAll(`[data-step="${seqStep}"]`).forEach(s => s.classList.add('playing'));
  if(seqPattern.kick[seqStep]) synth.noteOn(9, 36, 127);
  if(seqPattern.snare[seqStep]) synth.noteOn(9, 38, 127);
  if(seqPattern.hihat[seqStep]) synth.noteOn(9, 42, 127);
  if(seqPattern.note[seqStep]) synth.noteOn(0, 60, 100);
  seqStep = (seqStep + 1) % 16;
}

function toggleSeqStep(track, step) {
  seqPattern[track][step] = seqPattern[track][step]? 0 : 1;
  const el = document.querySelector(`[data-track="${track}"][data-step="${step}"]`);
  if(el) el.classList.toggle('active');
}

function updateBPM(val) {
  seqBPM = parseInt(val);
  if(seqPlaying) {toggleSeqPlay(); toggleSeqPlay();}
}

async function loadSF2FromURL() {
  const url = document.getElementById('sf2-url').value.trim();
  const status = document.getElementById('sf2-status');
  if(!url.includes('.sf2')) {if(status) {status.textContent = '❌ Must be .sf2'; status.style.color = '#FF3B30';} return;}
  const sizeHint = url.includes('Piano.sf2')? '~1GB' : url.includes('FluidR3')? '~148MB' : '~30MB';
  if(status) {status.textContent = `⏳ Downloading ${sizeHint}...`; status.style.color = 'var(--neon-secondary)';}
  try {
    if(!synth) synth = new WebAudioTinySynth({quality:1, useReverb:1});
    await synth.loadSoundFont(url);
    localStorage.setItem('nexus_sf2_url', url);
    if(status) {status.textContent = `✅ Loaded`; status.style.color = 'var(--neon-accent)';}
    document.getElementById('instrument-select').disabled = false;
    document.getElementById('mode-toggle').disabled = false;
    initMIDI();
    initFX();
  } catch(err) {
    if(status) {status.textContent = '❌ Error: ' + err.message; status.style.color = '#FF3B30';}
  }
}

function changeInstrument() {
  if(!synth) return;
  const instNum = parseInt(document.getElementById('instrument-select').value);
  synth.programChange(0, instNum);
  if(instNum === 128 &&!drumMode) toggleMode();
  if(instNum !== 128 && drumMode) toggleMode();
}

function playNote(midiNote, vel = currentVelocity, channel = 0) {
  if(!synth) return;
  synth.noteOn(channel, midiNote, vel);
  setTimeout(() => synth.noteOff(channel, midiNote), 400);
}

function updateVelocity(val) {
  currentVelocity = parseInt(val);
  const lbl = document.getElementById('vel-label');
  if(lbl) lbl.textContent = `VEL: ${val}`;
}

function updatePitchBend(val) {
  if(!synth) return;
  const bend = Math.round((val - 64) * 128);
  synth.pitchBend(0, bend);
  const lbl = document.getElementById('pb-label');
  if(lbl) lbl.textContent = `PB: ${val}`;
}

function updateModWheel(val) {
  if(!synth) return;
  synth.controllerChange(0, 1, parseInt(val));
  const lbl = document.getElementById('mod-label');
  if(lbl) lbl.textContent = `MOD: ${val}`;
}

function toggleMode() {
  drumMode = !drumMode;
  const btn = document.getElementById('mode-toggle');
  const kbdArea = document.getElementById('keyboard-area');
  if(drumMode) {
    if(btn) btn.textContent = '🎹 KEYS';
    if(btn) btn.classList.add('active');
    document.getElementById('instrument-select').value = '128';
    changeInstrument();
    if(kbdArea) kbdArea.innerHTML = `<div class="drum-pad">${DRUM_MAP.map(d => `<div class="pad" onclick="playNote(${d.note},100,9)" data-midi="${d.note}">${d.name}</div>`).join('')}</div>`;
  } else {
    if(btn) btn.textContent = '🥁 DRUM';
    if(btn) btn.classList.remove('active');
    if(kbdArea) kbdArea.innerHTML = `<div class="kbd">${[60,61,62,63,64,65,66,67,68,69,70,71,72,74].map((n,i) => `<div class="key ${[1,3,6,8,10].includes(i)?'black':''}" onclick="playNote(${n})" data-midi="${n}"></div>`).join('')}</div>`;
  }
}

function updateReverb(val) {if(reverb) reverb.wet.value = val / 100;}
function updateDelay(val) {if(delay) delay.wet.value = val / 100;}
function updateChorus(val) {if(chorus) chorus.wet.value = val / 100;}
function updateMixVol(ch, val) {if(mixerChannels[ch]) mixerChannels[ch].volume.value = Tone.gainToDb(val / 100);}
function toggleMixMute(ch) {if(mixerChannels[ch]) mixerChannels[ch].mute = !mixerChannels[ch].mute;}

function updateCompressor(param, val) {
  if(!masterCompressor) return;
  if(param === 'threshold') masterCompressor.threshold.value = -30 + (val / 100) * 30;
  if(param === 'ratio') masterCompressor.ratio.value = 1 + (val / 100) * 11;
}

async function loadSample(e, padIdx) {
  const file = e.target.files[0];
  if(!file) return;
  const buffer = await file.arrayBuffer();
  chopSamples[padIdx] = await Tone.context.decodeAudioData(buffer);
  const pads = document.querySelectorAll('.chop-pad');
  if(pads[padIdx]) pads[padIdx].classList.add('loaded');
}

function playChop(padIdx) {
  if(!chopSamples[padIdx]) return;
  const player = new Tone.Player(chopSamples[padIdx]).connect(masterGain);
  player.start();
}

function addNote() {
  prNotes.push({midi: 60, start: 0, duration: 1});
  renderPRNotes();
}

function clearNotes() {prNotes = []; renderPRNotes();}

function renderPRNotes() {
  const container = document.getElementById('pr-notes');
  if(!container) return;
  container.innerHTML = prNotes.map((n,i) => `<div class="pr-note" style="left:${n.start*40}px;top:${(127-n.midi)*15}px;width:${n.duration*40}px" onclick="delNote(${i})">●</div>`).join('');
}

function delNote(i) {prNotes.splice(i,1); renderPRNotes();}

function playPRNotes() {
  if(!synth) return;
  prNotes.forEach(n => {
    setTimeout(() => {
      synth.noteOn(0, n.midi, 100);
      setTimeout(() => synth.noteOff(0, n.midi), n.duration * 500);
    }, n.start * 500);
  });
}

function playArpeggiator() {
  if(!synth) return;
  const baseNote = 60;
  const scale = SCALES[selectedScale] || SCALES['C Major'];
  const notes = [];
  
  if(arpState.mode === 'UP') {
    for(let oct = 0; oct < arpState.octaves; oct++) {
      scale.forEach(offset => notes.push(baseNote + offset + (oct * 12)));
    }
  } else if(arpState.mode === 'DOWN') {
    for(let oct = arpState.octaves - 1; oct >= 0; oct--) {
      for(let i = scale.length - 1; i >= 0; i--) {
        notes.push(baseNote + scale[i] + (oct * 12));
      }
    }
  } else if(arpState.mode === 'UP_DOWN') {
    for(let oct = 0; oct < arpState.octaves; oct++) {
      scale.forEach(offset => notes.push(baseNote + offset + (oct * 12)));
    }
    for(let oct = arpState.octaves - 2; oct >= 0; oct--) {
      for(let i = scale.length - 1; i >= 0; i--) {
        notes.push(baseNote + scale[i] + (oct * 12));
      }
    }
  }
  
  const interval = (60 / seqBPM / arpState.speed) * 1000;
  let idx = 0;
  const arpInterval = setInterval(() => {
    if(idx >= notes.length) idx = 0;
    synth.noteOn(0, notes[idx], 100);
    setTimeout(() => synth.noteOff(0, notes[idx]), interval * 0.8);
    idx++;
  }, interval);
  
  setTimeout(() => clearInterval(arpInterval), interval * notes.length * 4);
}

function saveProject() {
  const name = prompt('Project name:');
  if(!name) return;
  
  const project = {
    name,
    metadata: {bpm: seqBPM, scale: selectedScale},
    sequencer: {pattern: JSON.parse(JSON.stringify(seqPattern))},
    pianoRoll: {notes: JSON.parse(JSON.stringify(prNotes))},
    mixer: {channels: mixerChannels.map((_, i) => ({volume: mixerChannels[i].volume.value}))},
    fx: {reverb: reverb?.wet.value || 0, delay: delay?.wet.value || 0, chorus: chorus?.wet.value || 0},
    envelope: JSON.parse(JSON.stringify(envelope))
  };
  
  projectList[name] = project;
  localStorage.setItem('nexus_projects', JSON.stringify(projectList));
  alert(`✅ Project "${name}" saved`);
}

function loadProject(name) {
  if(!projectList[name]) return;
  const p = projectList[name];
  
  seqBPM = p.metadata.bpm;
  selectedScale = p.metadata.scale;
  seqPattern = p.sequencer.pattern;
  prNotes = p.pianoRoll.notes;
  envelope = p.envelope;
  
  if(reverb) reverb.wet.value = p.fx.reverb;
  if(delay) delay.wet.value = p.fx.delay;
  if(chorus) chorus.wet.value = p.fx.chorus;
  
  renderPRNotes();
  alert(`✅ Project "${name}" loaded`);
}

function deleteProject(name) {
  delete projectList[name];
  localStorage.setItem('nexus_projects', JSON.stringify(projectList));
}

function makeDraggable(win) {
  const header = win.querySelector('.window-header');
  let isDown = false, offset = [0,0];
  header.onmousedown = e => {
    isDown = true;
    offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY];
    win.style.zIndex = ++windowZ;
  }
  document.onmouseup = () => isDown = false;
  document.onmousemove = e => {
    if(isDown) {
      win.style.left = (e.clientX + offset[0]) + 'px';
      win.style.top = (e.clientY + offset[1]) + 'px';
    }
  }
}

function toggleTheme() {
  const themes = ['ember','obsidian','cyberpunk'];
  const current = document.documentElement.getAttribute('data-theme') || 'ember';
  const next = themes[(themes.indexOf(current)+1)%3];
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('nexus_theme', next);
}

window.onload = () => {
  const savedTheme = localStorage.getItem('nexus_theme') || 'ember';
  document.documentElement.setAttribute('data-theme', savedTheme);
  openDecentSampler();
  setTimeout(() => openSequencer(), 200);
  setTimeout(() => openMixer(), 400);
};
