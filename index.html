<!DOCTYPE html>
<html lang="en" data-theme="ember">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEXUS DAW v38 OMNIVERSE - Piano Roll + FX + Mixer</title>
<link rel="manifest" href="manifest.json">
<style>
:root[data-theme="ember"] {
  --bg-deep:#030407;--bg-console:#0A0B0E;--bg-rack:#111215;--bg-window:#16171B;
  --neon-primary:#FF5A00;--neon-secondary:#FFB000;--neon-accent:#FFE600;
  --text-main:#E8E8E8;--text-dim:#7A7A7A;--border-hardware:#2A2A2E;--rec-red:#FF3B30;--play-green:#30D158;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text-main);font-family:'JetBrains Mono',monospace;font-size:11px;overflow:hidden;height:100vh}
.nexus-dock{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:var(--bg-console);border:1px solid var(--border-hardware);padding:8px;display:flex;gap:6px;z-index:9999}
.dock-btn{width:40px;height:40px;background:var(--bg-rack);border:1px solid var(--border-hardware);color:var(--neon-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.dock-btn:hover{border-color:var(--neon-primary);color:var(--neon-primary)}
.window{position:absolute;background:var(--bg-window);border:1px solid var(--border-hardware);min-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.8);overflow:hidden}
.window-header{background:var(--bg-rack);padding:6px 8px;border-bottom:1px solid var(--border-hardware);cursor:move;display:flex;justify-content:space-between;align-items:center}
.window-title{color:var(--neon-secondary);font-weight:700;font-size:10px;letter-spacing:1px}
.window-controls{display:flex;gap:4px}
.win-btn{width:16px;height:16px;background:var(--bg-console);border:1px solid var(--border-hardware);color:var(--text-dim);cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center}
.win-btn:hover{background:var(--neon-primary);color:#000}
.window-body{padding:12px;overflow:auto;height:calc(100% - 30px)}
.sf2-input{width:100%;background:var(--bg-deep);border:1px solid var(--border-hardware);color:var(--text-main);padding:6px;font-size:10px;margin-bottom:6px}
.sf2-btn{width:100%;background:var(--neon-primary);border:none;color:#000;padding:8px;font-size:10px;font-weight:700;cursor:pointer;margin-bottom:6px}
.sf2-btn:hover{background:var(--neon-secondary)}
.sf2-status{font-size:9px;color:var(--text-dim);padding:4px;background:var(--bg-deep);border:1px solid var(--border-hardware);margin-bottom:8px}
.instrument-select{width:100%;background:var(--bg-deep);border:1px solid var(--border-hardware);color:var(--neon-accent);padding:6px;font-size:10px;margin-bottom:8px}
.controls-row{display:flex;gap:6px;margin-bottom:8px}
.ctrl-group{flex:1}
.ctrl-label{font-size:8px;color:var(--text-dim);margin-bottom:2px;display:block}
.ctrl-slider{width:100%;height:4px;background:var(--bg-deep);appearance:none;border:1px solid var(--border-hardware)}
.ctrl-slider::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--neon-primary);cursor:pointer}
.mode-toggle{background:var(--bg-rack);border:1px solid var(--border-hardware);color:var(--neon-secondary);padding:4px 8px;font-size:9px;cursor:pointer;margin-bottom:8px;width:100%}
.mode-toggle.active{background:var(--neon-primary);color:#000;border-color:var(--neon-primary)}
.transport{display:flex;gap:6px;margin-bottom:8px}
.transport-btn{flex:1;background:var(--bg-rack);border:1px solid var(--border-hardware);color:var(--neon-secondary);padding:8px;font-size:10px;font-weight:700;cursor:pointer}
.transport-btn.rec{background:var(--rec-red);color:#fff;border-color:var(--rec-red)}
.transport-btn.play{background:var(--play-green);color:#000;border-color:var(--play-green)}
.transport-btn.rec.active,.transport-btn.play.active{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.midi-status{font-size:8px;color:var(--neon-accent);padding:4px;background:var(--bg-deep);border:1px solid var(--border-hardware);margin-bottom:8px;text-align:center}
.kbd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.key{height:40px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer}
.key:active,.key.active{background:var(--neon-primary)}
.key.black{background:var(--bg-deep);height:25px;transform:translateY(-15px)}
.drum-pad{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.pad{height:60px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-dim)}
.pad:active{background:var(--neon-primary);color:#000;border-color:var(--neon-accent)}
.sequencer{margin-top:8px;border-top:1px solid var(--border-hardware);padding-top:8px}
.seq-row{display:flex;gap:2px;margin-bottom:4px;align-items:center}
.seq-label{width:50px;font-size:8px;color:var(--text-dim)}
.seq-steps{display:flex;gap:2px;flex:1}
.seq-step{flex:1;height:20px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer}
.seq-step.active{background:var(--neon-primary)}
.seq-step.playing{border-color:var(--neon-accent);box-shadow:0 0 8px var(--neon-accent)}
.bpm-input{width:60px;background:var(--bg-deep);border:1px solid var(--border-hardware);color:var(--neon-accent);padding:4px;font-size:10px;text-align:center}
.pianoroll{height:200px;background:var(--bg-deep);border:1px solid var(--border-hardware);position:relative;overflow:auto;margin-top:8px}
.pr-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border-hardware) 1px, transparent 1px),linear-gradient(90deg, var(--border-hardware) 1px, transparent 1px);background-size:40px 20px}
.pr-note{position:absolute;height:18px;background:var(--neon-primary);border:1px solid var(--neon-accent);cursor:move;font-size:7px;color:#000;padding:0 2px;display:flex;align-items:center}
.fx-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.fx-label{width:60px;font-size:8px;color:var(--neon-secondary)}
.fx-knob{flex:1;height:4px;background:var(--bg-deep);appearance:none;border:1px solid var(--border-hardware)}
.fx-knob::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--neon-secondary);cursor:pointer}
.mixer{margin-top:8px;border-top:1px solid var(--border-hardware);padding-top:8px}
.mix-ch{display:flex;gap:4px;margin-bottom:4px;align-items:center}
.mix-label{width:40px;font-size:8px;color:var(--text-dim)}
.mix-fader{flex:1;height:4px;background:var(--bg-deep);appearance:none;border:1px solid var(--border-hardware)}
.mix-fader::-webkit-slider-thumb{appearance:none;width:12px;height:12px;background:var(--neon-accent);cursor:pointer}
.mix-btn{width:20px;height:20px;background:var(--bg-rack);border:1px solid var(--border-hardware);color:var(--text-dim);font-size:8px;cursor:pointer}
.mix-btn.active{background:var(--neon-primary);color:#000}
.chop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:8px}
.chop-pad{height:50px;background:var(--bg-rack);border:1px solid var(--border-hardware);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--neon-secondary)}
.chop-pad.loaded{background:var(--neon-primary);color:#000}
</style>
</head>
<body>
<div id="workspace"></div>

<div class="nexus-dock">
  <button class="dock-btn" onclick="openDecentSampler()" title="Decent Sampler">🎹</button>
  <button class="dock-btn" onclick="openSequencer()" title="16-Step Sequencer">🎛️</button>
  <button class="dock-btn" onclick="openPianoRoll()" title="Piano Roll">🎼</button>
  <button class="dock-btn" onclick="openFXRack()" title="FX Rack">🎚️</button>
  <button class="dock-btn" onclick="openMixer()" title="8-Ch Mixer">📊</button>
  <button class="dock-btn" onclick="openChopper()" title="Sample Chopper">✂️</button>
  <button class="dock-btn" onclick="toggleTheme()" title="Switch Theme">🎨</button>
</div>

<script src="https://unpkg.com/webaudio-tinysynth@1.6.3/webaudio-tinysynth.min.js"></script>
<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

const workspace = document.getElementById('workspace');
let windowZ = 100;
let synth = null;
let drumMode = false;
let currentVelocity = 100;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let midiAccess = null;

// TONE.JS FX CHAIN
let reverb, delay, chorus, masterGain;
let mixerChannels = Array(8).fill().map(() => new Tone.Channel().toDestination());

// SEQUENCER STATE
let seqPlaying = false;
let seqStep = 0;
let seqBPM = 120;
let seqInterval = null;
let seqPattern = {
  kick: new Array(16).fill(0),
  snare: new Array(16).fill(0),
  hihat: new Array(16).fill(0),
  note: new Array(16).fill(0)
};

// PIANO ROLL STATE
let prNotes = [];

// CHOPPER STATE
let chopSamples = Array(16).fill(null);

const GM_INSTRUMENTS = [
  '0: Acoustic Grand Piano','4: Electric Piano 1','24: Acoustic Guitar nylon','25: Acoustic Guitar steel',
  '26: Electric Guitar jazz','27: Electric Guitar clean','29: Overdriven Guitar','30: Distortion Guitar',
  '32: Acoustic Bass','33: Electric Bass finger','40: Violin','48: String Ensemble 1','56: Trumpet',
  '73: Flute','80: Lead 1 square','81: Lead 2 sawtooth','88: Pad 1 new age','128: Standard Drum Kit'
];

const DRUM_MAP = [
  {note: 36, name: 'Kick'}, {note: 38, name: 'Snare'}, {note: 42, name: 'HiHat C'}, {note: 46, name: 'HiHat O'},
  {note: 41, name: 'Tom L'}, {note: 45, name: 'Tom M'}, {note: 48, name: 'Tom H'}, {note: 49, name: 'Crash'},
  {note: 51, name: 'Ride'}, {note: 53, name: 'Ride Bell'}, {note: 37, name: 'Rim'}, {note: 39, name: 'Clap'},
  {note: 54, name: 'Tamb'}, {note: 56, name: 'Cowbell'}, {note: 69, name: 'Shaker'}, {note: 75, name: 'Clave'}
];

const SF2_PRESETS = [
  {name: 'GeneralUser GS 30MB', url: 'https://www.schristiancollins.com/generaluser/GeneralUser%20GS%20v1.471.sf2'},
  {name: 'Salamander Piano 1GB', url: 'https://musical-artifacts.com/artifacts/3/Piano.sf2'},
  {name: 'FluidR3 GM 148MB', url: 'https://keymusician01.s3.amazonaws.com/FluidR3_GM.sf2'}
];

async function initFX() {
  await Tone.start();
  reverb = new Tone.Reverb({decay: 2, wet: 0}).toDestination();
  delay = new Tone.FeedbackDelay({delayTime: "8n", feedback: 0.3, wet: 0}).connect(reverb);
  chorus = new Tone.Chorus({frequency: 1.5, delayTime: 3.5, depth: 0.7, wet: 0}).connect(delay);
  masterGain = new Tone.Gain(0.8).connect(chorus);
}

async function initMIDI() {
  const status = document.getElementById('midi-status');
  if(!navigator.requestMIDIAccess) {
    status.textContent = '❌ Browser tidak support MIDI';
    return;
  }
  try {
    midiAccess = await navigator.requestMIDIAccess();
    const inputs = midiAccess.inputs.values();
    let found = false;
    for(let input of inputs) {
      input.onmidimessage = handleMIDIMessage;
      status.textContent = `✅ MIDI: ${input.name}`;
      found = true;
    }
    if(!found) status.textContent = '⚠️ MIDI ready. Colok keyboard USB';
    midiAccess.onstatechange = initMIDI;
  } catch(e) {
    status.textContent = '❌ MIDI Error: ' + e.message;
  }
}

function handleMIDIMessage(msg) {
  if(!synth) return;
  const [cmd, note, vel] = msg.data;
  const type = cmd & 0xf0;
  if(type === 0x90 && vel > 0) {
    synth.noteOn(0, note, vel);
    highlightKey(note, true);
  } else if(type === 0x80 || (type === 0x90 && vel === 0)) {
    synth.noteOff(0, note);
    highlightKey(note, false);
  } else if(type === 0xB0) {
    if(note === 1) synth.controllerChange(0, 1, vel);
  } else if(type === 0xE0) {
    const bend = ((vel << 7) | note) - 8192;
    synth.pitchBend(0, bend);
  }
}

function highlightKey(midiNote, on) {
  const key = document.querySelector(`[data-midi="${midiNote}"]`);
  if(key) key.classList.toggle('active', on);
}

async function toggleRecord() {
  const btn = document.getElementById('rec-btn');
  if(!isRecording) {
    if(!synth) {alert('Load SF2 dulu');return;}
    const stream = synth.getAudioNode().context.createMediaStreamDestination();
    synth.getAudioNode().connect(stream);
    mediaRecorder = new MediaRecorder(stream.stream);
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = exportWAV;
    mediaRecorder.start();
    isRecording = true;
    btn.textContent = '■ STOP';
    btn.classList.add('active');
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.textContent = '● REC';
    btn.classList.remove('active');
  }
}

function exportWAV() {
  const blob = new Blob(recordedChunks, {type: 'audio/webm'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const timestamp = new Date().toISOString().slice(0,19).replace(/:/g,'-').replace('T','_');
  a.href = url;
  a.download = `NEXUS_DAW_${timestamp}.wav`;
  a.click();
  URL.revokeObjectURL(url);
}

function toggleSeqPlay() {
  const btn = document.getElementById('seq-play-btn');
  if(!seqPlaying) {
    if(!synth) {alert('Load SF2 dulu');return;}
    seqPlaying = true;
    seqStep = 0;
    btn.textContent = '■ STOP';
    btn.classList.add('active');
    const interval = (60 / seqBPM / 4) * 1000;
    seqInterval = setInterval(seqTick, interval);
  } else {
    seqPlaying = false;
    clearInterval(seqInterval);
    btn.textContent = '▶ PLAY';
    btn.classList.remove('active');
    document.querySelectorAll('.seq-step.playing').forEach(s => s.classList.remove('playing'));
  }
}

function seqTick() {
  document.querySelectorAll('.seq-step.playing').forEach(s => s.classList.remove('playing'));
  document.querySelectorAll(`[data-step="${seqStep}"]`).forEach(s => s.classList.add('playing'));
  if(seqPattern.kick[seqStep]) synth.noteOn(9, 36, 127);
  if(seqPattern.snare[seqStep]) synth.noteOn(9, 38, 127);
  if(seqPattern.hihat[seqStep]) synth.noteOn(9, 42, 127);
  if(seqPattern.note[seqStep]) synth.noteOn(0, 60, 100);
  seqStep = (seqStep + 1) % 16;
}

function toggleSeqStep(track, step) {
  seqPattern[track][step] = seqPattern[track][step]? 0 : 1;
  document.querySelector(`[data-track="${track}"][data-step="${step}"]`).classList.toggle('active');
}

function updateBPM(val) {
  seqBPM = parseInt(val);
  if(seqPlaying) {
    toggleSeqPlay();
    toggleSeqPlay();
  }
}

async function loadSF2FromURL() {
  const url = document.getElementById('sf2-url').value.trim();
  const status = document.getElementById('sf2-status');
  if(!url.includes('.sf2')) {
    status.textContent = '❌ URL harus.sf2';
    status.style.color = '#FF3B30';
    return;
  }
  const sizeHint = url.includes('Piano.sf2')? '~1GB' : url.includes('FluidR3')? '~148MB' : '~30MB';
  status.textContent = `⏳ Downloading SF2 ${sizeHint}... Sabar`;
  status.style.color = 'var(--neon-secondary)';
  try {
    if(!synth) synth = new WebAudioTinySynth({quality:1, useReverb:1});
    await synth.loadSoundFont(url);
    localStorage.setItem('nexus_sf2_url', url);
    status.textContent = `✅ Loaded: ${url.split('/').pop()}`;
    status.style.color = 'var(--neon-accent)';
    document.getElementById('instrument-select').disabled = false;
    document.getElementById('mode-toggle').disabled = false;
    initMIDI();
    initFX();
  } catch(err) {
    status.textContent = '❌ Error: ' + err.message + ' | Coba GeneralUser dulu';
    status.style.color = '#FF3B30';
  }
}

function changeInstrument() {
  if(!synth) return;
  const instNum = parseInt(document.getElementById('instrument-select').value);
  synth.programChange(0, instNum);
  if(instNum === 128 &&!drumMode) toggleMode();
  if(instNum!== 128 && drumMode) toggleMode();
}

function playNote(midiNote, vel = currentVelocity, channel = 0) {
  if(!synth) {
    document.getElementById('sf2-status').textContent = '⚠️ Klik LOAD SF2 dulu';
    return;
  }
  synth.noteOn(channel, midiNote, vel);
  setTimeout(() => synth.noteOff(channel, midiNote), 400);
}

function updateVelocity(val) {
  currentVelocity = parseInt(val);
  document.getElementById('vel-label').textContent = `VEL: ${val}`;
}

function updatePitchBend(val) {
  if(!synth) return;
  const bend = Math.round((val - 64) * 128);
  synth.pitchBend(0, bend);
  document.getElementById('pb-label').textContent = `PB: ${val}`;
}

function updateModWheel(val) {
  if(!synth) return;
  synth.controllerChange(0, 1, parseInt(val));
  document.getElementById('mod-label').textContent = `MOD: ${val}`;
}

function toggleMode() {
  drumMode =!drumMode;
  const btn = document.getElementById('mode-toggle');
  const kbdArea = document.getElementById('keyboard-area');
  if(drumMode) {
    btn.textContent = '🎹 SWITCH TO KEYS';
    btn.classList.add('active');
    document.getElementById('instrument-select').value = '128';
    changeInstrument();
    kbdArea.innerHTML = `<div class="drum-pad">${DRUM_MAP.map(d => 
      `<div class="pad" onclick="playNote(${d.note},100,9)" data-midi="${d.note}">${d.name}</div>`
    ).join('')}</div>`;
  } else {
    btn.textContent = '🥁 SWITCH TO DRUM PAD';
    btn.classList.remove('active');
    kbdArea.innerHTML = `
      <div class="kbd">
        ${[60,61,62,63,64,65,66,67,68,69,70,71,72,74].map((n,i) => 
          `<div class="key ${[1,3,6,8,10].includes(i)?'black':''}" onclick="playNote(${n})" data-midi="${n}"></div>`
        ).join('')}
      </div>
    `;
  }
}

function updateReverb(val) {
  if(reverb) reverb.wet.value = val / 100;
}
function updateDelay(val) {
  if(delay) delay.wet.value = val / 100;
}
function updateChorus(val) {
  if(chorus) chorus.wet.value = val / 100;
}

function updateMixVol(ch, val) {
  if(mixerChannels[ch]) mixerChannels[ch].volume.value = Tone.gainToDb(val / 100);
}
function toggleMixMute(ch) {
  if(mixerChannels[ch]) mixerChannels[ch].mute =!mixerChannels[ch].mute;
}

async function loadSample(e, padIdx) {
  const file = e.target.files[0];
  if(!file) return;
  const buffer = await file.arrayBuffer();
  chopSamples[padIdx] = await Tone.context.decodeAudioData(buffer);
  document.querySelectorAll('.chop-pad')[padIdx].classList.add('loaded');
}
function playChop(padIdx) {
  if(!chopSamples[padIdx]) return;
  const player = new Tone.Player(chopSamples[padIdx]).connect(masterGain);
  player.start();
}

function openDecentSampler() {
  const win = document.createElement('div');
  win.className = 'window';
  win.style.left = '40px';
  win.style.top = '40px';
  win.style.width = '480px';
  win.style.height = '600px';
  win.style.zIndex = ++windowZ;
  const savedURL = localStorage.getItem('nexus_sf2_url') || SF2_PRESETS[0].url;
  let instOptions = GM_INSTRUMENTS.map(i => `<option value="${i.split(':')[0]}">${i}</option>`).join('');
  let sf2Options = SF2_PRESETS.map(s => `<option value="${s.url}">${s.name}</option>`).join('');
  win.innerHTML = `
    <div class="window-header">
      <div class="window-title">DECENT SAMPLER - OMNIVERSE MODE</div>
      <div class="window-controls">
        <button class="win-btn" onclick="this.closest('.window').remove()">✕</button>
      </div>
    </div>
    <div class="window-body">
      <div id="midi-status" class="midi-status">🎹 MIDI: Not connected</div>
      <select id="sf2-preset" class="instrument-select" onchange="document.getElementById('sf2-url').value=this.value">
        ${sf2Options}
      </select>
      <input id="sf2-url" class="sf2-input" value="${savedURL}">
      <button class="sf2-btn" onclick="loadSF2FromURL()">⚡ LOAD SF2 FROM URL</button>
      <div id="sf2-status" class="sf2-status">Ready. Pilih Salamander 1GB atau GeneralUser 30MB</div>
      <select id="instrument-select" class="instrument-select" onchange="changeInstrument()" disabled>
        ${instOptions}
      </select>
      <button id="mode-toggle" class="mode-toggle" onclick="toggleMode()" disabled>🥁 SWITCH TO DRUM PAD</button>
      <div class="controls-row">
        <div class="ctrl-group">
          <span id="vel-label" class="ctrl-label">VEL: 100</span>
          <input type="range" min="1" max="127" value="100" class="ctrl-slider" oninput="updateVelocity(this.value)">
        </div>
        <div class="ctrl-group">
          <span id="pb-label" class="ctrl-label">PB: 64</span>
          <input type="range" min="0" max="127" value="64" class="ctrl-slider" oninput="updatePitchBend(this.value)" onmouseup="this.value=64;updatePitchBend(64)">
        </div>
        <div class="ctrl-group">
          <span id="mod-label" class="ctrl-label">MOD: 0</span>
          <input type="range" min="0" max="127" value="0" class="ctrl-slider" oninput="updateModWheel(this.value)">
        </div>
      </div>
      <div class="transport">
        <button id="rec-btn" class="transport-btn rec" onclick="toggleRecord()">● REC</button>
      </div>
      <div id="keyboard-area">
        <div class="kbd">
          ${[60,61,62,63,64,65,66,67,68,69,70,71,72,74].map((n,i) => 
            `<div class="key ${[1,3,6,8,10].includes(i)?'black':''}" onclick="playNote(${n})" data-midi="${n}"></div>`
          ).join('')}
        </div>
      </div>
    </div>
  `;
  workspace.appendChild(win);
  makeDraggable(win);
}

function openSequencer() {
  const win = document.createElement('div');
  win.className = 'window';
  win.style.left = '540px';

        <button id="seq-play-btn" class="transport-btn play" onclick="toggleSeqPlay()">▶ PLAY</button>

        <div class="seq-row">

function openPianoRoll() {
  const win = document.createElement('div');
  win.className = 'window';
  win.style.left = '40px';
  win.style.top = '400px';
  win.style.width = '600px';
  win.style.height = '300px';

      <div class="window-title">PIANO ROLL EDITOR - FL STYLE</div>

      </div>
    </div>
    <div class="window-body">
      <div class="transport">
        <button class="transport-btn" onclick="addNote()">+ ADD NOTE</button>
        <button class="transport-btn" onclick="clearNotes()">CLEAR</button>
        <button class="transport-btn play" onclick="playPRNotes()">▶ PLAY</button>
      </div>
      <div class="pianoroll">
        <div class="pr-grid"></div>
        <div id="pr-notes"></div>
      </div>
    </div>
  `;
  workspace.appendChild(win);
  makeDraggable(win);
}

function addNote() {
  const note = {midi: 60, start: 0, duration: 1};
  prNotes.push(note);
  renderPRNotes();
}
function clearNotes() {
  prNotes = [];
  renderPRNotes();
}
function renderPRNotes() {
  const container = document.getElementById('pr-notes');
  if(!container) return;
  container.innerHTML = prNotes.map((n,i) => 
    `<div class="pr-note" style="left:${n.start*40}px;top:${(127-n.midi)*20}px;width:${n.duration*40}px" onclick="delNote(${i})">C4</div>`
  ).join('');
}
function delNote(i) {
  prNotes.splice(i,1);
  renderPRNotes();
}
function playPRNotes() {
  if(!synth) return;
  prNotes.forEach(n => {
    setTimeout(() => {
      synth.noteOn(0, n.midi, 100);
      setTimeout(() => synth.noteOff(0, n.midi), n.duration * 500);
    }, n.start * 500);
  });
}

      <div class="window-controls">

      </div>
    </div>
    <div class="window-body">
      <div class="chop-grid">
        ${Array(16).fill(0).map((_, i) => `
        <div class="chop-pad" onclick="playChop(${i})">
          <input type="file" accept="audio/*" style="display:none" onchange="loadSample(event,${i})">
          <label style="cursor:pointer;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8px">PAD ${i+1}</label>
        </div>
        `).join('')}
      </div>
    </div>
  `;
  workspace.appendChild(win);
  makeDraggable(win);
}

function makeDraggable(win) {
  const header = win.querySelector('.window-header');
  let isDown = false, offset = [0,0];
  header.onmousedown = e => {
    isDown = true;
    offset = [win.offsetLeft - e.clientX, win.offsetTop - e.clientY];
    win.style.zIndex = ++windowZ;
  }
  document.onmouseup = () => isDown = false;
  document.onmousemove = e => {
    if(isDown) {
      win.style.left = (e.clientX + offset[0]) + 'px';
      win.style.top = (e.clientY + offset[1]) + 'px';
    }
  }
}

function toggleTheme() {
  const themes = ['ember','obsidian','cyberpunk'];
  const current = document.documentElement.getAttribute('data-theme') || 'ember';
  const next = themes[(themes.indexOf(current)+1)%3];
  document.documentElement.setAttribute('data-theme', next);
}

window.onload = () => {
  openDecentSampler();
  setTimeout(() => openSequencer(), 300);
};
